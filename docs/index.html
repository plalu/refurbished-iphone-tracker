<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple整備済 掲載履歴</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }
    header {
      background: #000;
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header svg { flex-shrink: 0; }
    .header-title { font-size: 1.1rem; font-weight: 600; }
    .header-meta {
      margin-left: auto;
      font-size: 0.75rem;
      color: #a1a1a6;
      text-align: right;
    }
    nav {
      background: #1a1a1a;
      padding: 0 24px;
      display: flex;
      gap: 4px;
    }
    nav a {
      color: #a1a1a6;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 16px;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom-color: #fff; }
    main { max-width: 960px; margin: 0 auto; padding: 32px 16px; }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .available-title { color: #1d1d1f; }
    .ended-title { color: #6e6e73; margin-top: 40px; }
    .count {
      background: #e8e8ed;
      color: #6e6e73;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 99px;
      padding: 2px 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-ended { opacity: .65; }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .card-title { font-size: 0.92rem; font-weight: 600; line-height: 1.4; }
    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { text-decoration: underline; color: #0071e3; }
    .badge {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 6px;
      padding: 2px 7px;
    }
    .badge-available { background: #d1f0da; color: #1a7f37; }
    .badge-ended { background: #e8e8ed; color: #6e6e73; }
    .card-body { display: flex; flex-direction: column; gap: 6px; }
    .meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .part-number { font-size: 0.75rem; color: #6e6e73; font-family: monospace; }
    .price { font-size: 1rem; font-weight: 700; color: #1d1d1f; }
    .first-seen { font-size: 0.75rem; color: #6e6e73; }
    .periods { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
    .period { font-size: 0.75rem; color: #3a3a3c; background: #f5f5f7; border-radius: 6px; padding: 5px 8px; }
    .period-label { font-weight: 600; margin-right: 4px; color: #6e6e73; }
    .period-dur { color: #6e6e73; margin-left: 4px; }
    .ongoing { color: #1a7f37; font-weight: 600; }
    .empty { color: #6e6e73; padding: 20px 0; }
    footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 0.75rem;
      color: #a1a1a6;
    }
    footer a { color: #a1a1a6; }
    .price-row { display: flex; flex-direction: column; gap: 2px; }
    .price-refurb { font-size: 1rem; font-weight: 700; color: #1d1d1f; }
    .price-retail { font-size: 0.75rem; color: #6e6e73; }
    .price-retail span { text-decoration: none; }
    .price-discount {
      font-size: 0.7rem;
      font-weight: 600;
      color: #1a7f37;
      background: #d1f0da;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }
    .hub-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow 0.15s;
    }
    .hub-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .hub-label { font-size: 1.3rem; font-weight: 700; }
    .hub-count { font-size: 1rem; color: #1a7f37; font-weight: 600; }
    .hub-updated { font-size: 0.75rem; color: #6e6e73; }
  </style>
</head>

</html>
