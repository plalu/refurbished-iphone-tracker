name: Apple整備済商品監視

on:
  schedule:
    # 毎日 0時・6時・12時・18時 (JST) = UTC 15時・21時・3時・9時
    - cron: "0 15,21,3,9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright (Chromium) をインストール
        run: python -m playwright install --with-deps chromium

      - name: iPhone をスクレイピング
        run: python scraper.py iphone

      - name: Mac をスクレイピング
        run: python scraper.py mac
        continue-on-error: true

      - name: iPad をスクレイピング
        run: python scraper.py ipad
        continue-on-error: true

      - name: HTMLページを生成
        run: python generate_html.py

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/iphone.json data/mac.json data/ipad.json docs/index.html docs/iphone.html docs/mac.html docs/ipad.html || true
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "データ更新: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase
            git push
          fi

      - name: 掲載状況サマリーを表示
        run: python viewer.py
